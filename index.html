<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PACT — Dashboard Consultor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0c1a14; --surface: #122019; --surface2: #1a2e24;
  --border: #2a4a3a; --accent: #0F6E56; --accent-light: #14956f;
  --gold: #c49a1a; --gold-light: #d7be88;
  --success: #22c55e; --warning: #f59e0b; --error: #ef4444; --info: #3b82f6;
  --text: #e4e4e7; --dim: #8a9a90; --white: #ffffff;
  --era-red: #cc0000;
  --stage-qual: #3b82f6; --stage-vis: #8b5cf6; --stage-ofe: #f59e0b;
  --stage-cpcv: #ec4899; --stage-cred: #06b6d4; --stage-esc: #22c55e;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,-apple-system,sans-serif; min-height:100vh; }

/* Auth Screen */
.auth-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; }
.auth-box { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:48px 40px; max-width:400px; width:100%; text-align:center; }
.auth-box h1 { font-size:28px; font-weight:700; margin-bottom:4px; }
.auth-box .subtitle { color:var(--dim); font-size:14px; margin-bottom:32px; }
.auth-box input { width:100%; padding:14px 16px; background:var(--surface2); border:1px solid var(--border); border-radius:10px; color:var(--text); font-size:16px; outline:none; margin-bottom:16px; }
.auth-box input:focus { border-color:var(--accent); }
.auth-box button { width:100%; padding:14px; background:var(--accent); color:white; border:none; border-radius:10px; font-size:16px; font-weight:600; cursor:pointer; transition:background .2s; }
.auth-box button:hover { background:var(--accent-light); }
.auth-error { color:var(--error); font-size:13px; margin-bottom:12px; display:none; }

/* App */
.app { display:none; }
.topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:16px 24px; display:flex; align-items:center; justify-content:space-between; }
.topbar-left { display:flex; align-items:center; gap:12px; }
.topbar-left h1 { font-size:20px; font-weight:700; }
.topbar-left h1 span { color:var(--accent); }
.topbar-right { display:flex; align-items:center; gap:16px; }
.consultant-name { font-size:14px; color:var(--dim); }
.consultant-name strong { color:var(--text); }
.btn-logout { background:none; border:1px solid var(--border); color:var(--dim); padding:6px 14px; border-radius:8px; cursor:pointer; font-size:13px; }
.btn-logout:hover { border-color:var(--error); color:var(--error); }

.container { max-width:1280px; margin:0 auto; padding:24px; }

/* KPI Row */
.kpi-row { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px; }
.kpi { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; }
.kpi-label { font-size:12px; color:var(--dim); text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; }
.kpi-value { font-size:32px; font-weight:700; }
.kpi-sub { font-size:12px; color:var(--dim); margin-top:4px; }

/* Client Cards */
.section-title { font-size:18px; font-weight:600; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
.section-title .count { background:var(--surface2); color:var(--dim); padding:2px 10px; border-radius:12px; font-size:13px; }

.client-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(380px,1fr)); gap:16px; margin-bottom:32px; }
.client-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; transition:border-color .2s; }
.client-card:hover { border-color:var(--accent); }
.client-header { padding:16px 20px 12px; display:flex; justify-content:space-between; align-items:flex-start; }
.client-name { font-size:16px; font-weight:600; }
.client-score { padding:4px 10px; border-radius:8px; font-size:13px; font-weight:600; }
.score-pronto { background:rgba(34,197,94,.15); color:var(--success); }
.score-quase { background:rgba(245,158,11,.15); color:var(--warning); }
.score-preparar { background:rgba(59,130,246,.15); color:var(--info); }
.score-frio { background:rgba(113,113,122,.15); color:var(--dim); }

.client-details { padding:0 20px; font-size:13px; color:var(--dim); }
.client-details .row { display:flex; justify-content:space-between; margin-bottom:6px; }
.client-details .value { color:var(--text); }

/* Pipeline Progress */
.pipeline-bar-container { padding:12px 20px 16px; }
.pipeline-label { font-size:12px; color:var(--dim); margin-bottom:6px; display:flex; justify-content:space-between; }
.pipeline-bar { height:8px; background:var(--surface2); border-radius:4px; overflow:hidden; }
.pipeline-fill { height:100%; border-radius:4px; transition:width .6s ease; }

/* Tasks */
.tasks-section { padding:0 20px 16px; }
.tasks-title { font-size:12px; color:var(--dim); text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; }
.task-item { display:flex; align-items:center; gap:8px; padding:4px 0; font-size:13px; }
.task-check { width:16px; height:16px; border-radius:4px; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.task-check.done { background:var(--accent); border-color:var(--accent); }
.task-check.done::after { content:'✓'; color:white; font-size:10px; }
.task-text { color:var(--dim); }
.task-text.done { color:var(--text); text-decoration:line-through; opacity:.6; }

/* Visits */
.visit-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px 20px; margin-bottom:12px; }
.visit-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.visit-status { padding:3px 10px; border-radius:6px; font-size:12px; font-weight:600; }
.vs-done { background:rgba(34,197,94,.15); color:var(--success); }
.vs-confirmed { background:rgba(59,130,246,.15); color:var(--info); }
.vs-proposed { background:rgba(245,158,11,.15); color:var(--warning); }
.vs-cancelled { background:rgba(239,68,68,.15); color:var(--error); }
.visit-details { font-size:13px; color:var(--dim); }
.visit-details strong { color:var(--text); }
.visit-rating { margin-top:8px; font-size:13px; }

/* Funnel Chart */
.chart-container { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:24px; }

/* Responsive */
@media(max-width:900px) { .kpi-row { grid-template-columns:repeat(2,1fr); } }
@media(max-width:600px) {
  .kpi-row { grid-template-columns:1fr; }
  .client-grid { grid-template-columns:1fr; }
  .topbar { flex-direction:column; gap:12px; }
}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div class="auth-screen" id="authScreen">
  <div class="auth-box">
    <h1>PACT</h1>
    <div class="subtitle">Equipa ALATUS — ERA Porto Baixa</div>
    <div class="auth-error" id="authError">Password incorrecta</div>
    <input type="password" id="pwdInput" placeholder="Password da equipa" autofocus>
    <select id="consultantSelect" style="width:100%;padding:14px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:16px;margin-bottom:16px;outline:none;">
      <option value="">Selecciona o teu nome...</option>
    </select>
    <button onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="topbar">
    <div class="topbar-left">
      <h1><span>PACT</span> Dashboard</h1>
    </div>
    <div class="topbar-right">
      <div class="consultant-name">Consultor: <strong id="currentName">—</strong></div>
      <button class="btn-logout" onclick="doLogout()">Sair</button>
    </div>
  </div>

  <div class="container">
    <div id="loading" style="text-align:center;padding:60px;color:var(--dim);">A carregar dados...</div>
    <div id="content" style="display:none">

      <!-- KPIs -->
      <div class="kpi-row" id="kpiRow"></div>

      <!-- Pipeline Funnel (Director only) -->
      <div id="funnelSection" style="display:none">
        <div class="section-title">Funil da Equipa</div>
        <div class="chart-container">
          <canvas id="funnelChart" height="80"></canvas>
        </div>
      </div>

      <!-- Clients -->
      <div class="section-title">Os Meus Clientes <span class="count" id="clientCount">0</span></div>
      <div class="client-grid" id="clientGrid"></div>

      <!-- Upcoming Visits -->
      <div class="section-title">Próximas Visitas <span class="count" id="visitCount">0</span></div>
      <div id="visitsList"></div>

    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
// SUPABASE CONFIG
// ══════════════════════════════════════════════════════════════
const SB_URL = 'https://btkdpjlltekssobfzdhu.supabase.co/rest/v1';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ0a2RwamxsdGVrc3NvYmZ6ZGh1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2NzA4ODgsImV4cCI6MjA4NjI0Njg4OH0.6IwYG23OD9Rh2fpVMlGiaZy77d3CKczpudIzjZ9dEZM';
const H = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY };
const PASSWORD = 'alatus2026';

const STAGE_MAP = {
  'qualificacao': { label: 'Qualificação', color: '#3b82f6', order: 1 },
  'visitas':      { label: 'Visitas',      color: '#8b5cf6', order: 2 },
  'oferta':       { label: 'Oferta',       color: '#f59e0b', order: 3 },
  'cpcv':         { label: 'CPCV',         color: '#ec4899', order: 4 },
  'credito':      { label: 'Crédito',      color: '#06b6d4', order: 5 },
  'escritura':    { label: 'Escritura',    color: '#22c55e', order: 6 },
  'concluido':    { label: 'Concluído',    color: '#22c55e', order: 7 }
};

const STATUS_VISIT = {
  'done':      { label: 'Realizada',  class: 'vs-done' },
  'confirmed': { label: 'Confirmada', class: 'vs-confirmed' },
  'proposed':  { label: 'Proposta',   class: 'vs-proposed' },
  'cancelled': { label: 'Cancelada',  class: 'vs-cancelled' }
};

let currentConsultant = null;
let allConsultants = [];

// ══════════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════════
async function q(table, params='') {
  const r = await fetch(`${SB_URL}/${table}?${params}`, { headers: H });
  if (!r.ok) throw new Error(`Supabase ${r.status}: ${r.statusText}`);
  return r.json();
}

function esc(s) { if(!s)return''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function fmtDate(d) { if(!d) return '—'; return new Date(d).toLocaleDateString('pt-PT',{day:'2-digit',month:'2-digit',year:'numeric',timeZone:'Europe/Lisbon'}); }
function fmtDateTime(d) { if(!d) return '—'; return new Date(d).toLocaleDateString('pt-PT',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit',timeZone:'Europe/Lisbon'}); }
function fmtMoney(v) { if(!v) return '—'; return new Intl.NumberFormat('pt-PT',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(v); }

function scoreClass(score) {
  if (score >= 75) return 'score-pronto';
  if (score >= 50) return 'score-quase';
  if (score >= 25) return 'score-preparar';
  return 'score-frio';
}
function scoreLabel(score) {
  if (score >= 75) return 'Pronto';
  if (score >= 50) return 'Quase';
  if (score >= 25) return 'A preparar';
  return 'Frio';
}

// ══════════════════════════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════════════════════════
async function loadConsultants() {
  try {
    allConsultants = await q('consultants', 'order=name');
    const sel = document.getElementById('consultantSelect');
    allConsultants.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = c.name + (c.role === 'director' ? ' (Director)' : '');
      sel.appendChild(opt);
    });
  } catch(e) { console.error('Erro a carregar consultores:', e); }
}

function doLogin() {
  const pwd = document.getElementById('pwdInput').value;
  const cid = document.getElementById('consultantSelect').value;
  const err = document.getElementById('authError');

  if (pwd !== PASSWORD) { err.style.display = 'block'; err.textContent = 'Password incorrecta'; return; }
  if (!cid) { err.style.display = 'block'; err.textContent = 'Selecciona o teu nome'; return; }

  currentConsultant = allConsultants.find(c => c.id === cid);
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('currentName').textContent = currentConsultant.name;

  loadDashboard();
}

function doLogout() {
  currentConsultant = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('authScreen').style.display = 'flex';
  document.getElementById('pwdInput').value = '';
  document.getElementById('consultantSelect').value = '';
}

document.getElementById('pwdInput').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

// ══════════════════════════════════════════════════════════════
// DASHBOARD
// ══════════════════════════════════════════════════════════════
async function loadDashboard() {
  try {
    const isDirector = currentConsultant.role === 'director';

    // Fetch data
    const clientFilter = isDirector ? '' : `consultant_id=eq.${currentConsultant.id}&`;
    const [clients, progress, visits, stages, qualifications] = await Promise.all([
      q('clients', `${clientFilter}status=eq.active&order=qualification_score.desc`),
      q('client_pipeline_progress', 'order=stage_key'),
      q('visits', `${clientFilter.replace('consultant_id','consultant_id')}order=proposed_datetime.desc`),
      q('pipeline_stages', 'order=stage_order'),
      q('qualification_responses', 'order=created_at.desc')
    ]);

    // Map progress by client
    const progressMap = {};
    progress.forEach(p => {
      if (!progressMap[p.client_id]) progressMap[p.client_id] = [];
      progressMap[p.client_id].push(p);
    });

    // Map qualifications by client
    const qualMap = {};
    qualifications.forEach(qr => { qualMap[qr.client_id] = qr; });

    // Map stage sub_tasks
    const stageTaskMap = {};
    stages.forEach(s => { stageTaskMap[s.stage_key] = s; });

    // ── KPIs ──
    const activeClients = clients.length;
    const avgScore = clients.length ? Math.round(clients.reduce((a,c) => a + (c.qualification_score||0), 0) / clients.length) : 0;
    const upcomingVisits = visits.filter(v => v.visit_status === 'confirmed' || v.visit_status === 'proposed').length;
    const doneVisits = visits.filter(v => v.visit_status === 'done').length;

    const totalTasks = progress.length;
    const doneTasks = progress.filter(p => p.completed).length;

    document.getElementById('kpiRow').innerHTML = `
      <div class="kpi">
        <div class="kpi-label">Clientes Activos</div>
        <div class="kpi-value">${activeClients}</div>
        <div class="kpi-sub">${isDirector ? 'Toda a equipa' : 'Os teus'}</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Score Médio</div>
        <div class="kpi-value" style="color:${avgScore >= 70 ? 'var(--success)' : avgScore >= 40 ? 'var(--warning)' : 'var(--dim)'}">${avgScore}</div>
        <div class="kpi-sub">Qualificação</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Visitas Agendadas</div>
        <div class="kpi-value" style="color:var(--info)">${upcomingVisits}</div>
        <div class="kpi-sub">${doneVisits} realizadas</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Tarefas</div>
        <div class="kpi-value">${doneTasks}/${totalTasks}</div>
        <div class="kpi-sub">${totalTasks > 0 ? Math.round(doneTasks/totalTasks*100) : 0}% completas</div>
      </div>
    `;

    // ── Funnel (Director) ──
    if (isDirector) {
      document.getElementById('funnelSection').style.display = 'block';
      const funnelData = {};
      stages.forEach(s => { funnelData[s.stage_key] = { name: s.stage_name, count: 0, order: s.stage_order }; });
      clients.forEach(c => { if (funnelData[c.pipeline_stage]) funnelData[c.pipeline_stage].count++; });

      const sortedStages = Object.values(funnelData).sort((a,b) => a.order - b.order);
      const stageKeys = Object.keys(funnelData).sort((a,b) => funnelData[a].order - funnelData[b].order);

      new Chart(document.getElementById('funnelChart'), {
        type: 'bar',
        data: {
          labels: sortedStages.map(s => s.name),
          datasets: [{
            data: sortedStages.map(s => s.count),
            backgroundColor: stageKeys.map(k => STAGE_MAP[k]?.color || '#666'),
            borderRadius: 6,
            barThickness: 40
          }]
        },
        options: {
          indexAxis: 'y',
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { color: 'rgba(255,255,255,.05)' }, ticks: { color: '#8a9a90', stepSize: 1 } },
            y: { grid: { display: false }, ticks: { color: '#e4e4e7', font: { size: 13 } } }
          }
        }
      });
    }

    // ── Client Cards ──
    document.getElementById('clientCount').textContent = clients.length;
    const grid = document.getElementById('clientGrid');
    grid.innerHTML = '';

    clients.forEach(client => {
      const cProgress = progressMap[client.id] || [];
      const cQual = qualMap[client.id];
      const done = cProgress.filter(p => p.completed).length;
      const total = cProgress.length;
      const pct = total > 0 ? Math.round(done/total*100) : 0;
      const stage = STAGE_MAP[client.pipeline_stage] || { label: client.pipeline_stage, color: '#666' };

      // Get pending tasks for this client
      const pendingTasks = cProgress.filter(p => !p.completed).slice(0, 3);
      const doneTasks = cProgress.filter(p => p.completed);

      // Get consultant name
      const consultant = allConsultants.find(c => c.id === client.consultant_id);

      const card = document.createElement('div');
      card.className = 'client-card';
      card.innerHTML = `
        <div class="client-header">
          <div>
            <div class="client-name">${esc(client.name)}</div>
            <div style="font-size:12px;color:var(--dim);margin-top:2px;">${consultant ? consultant.name : '—'}</div>
          </div>
          <div class="client-score ${scoreClass(client.qualification_score)}">
            ${client.qualification_score} — ${scoreLabel(client.qualification_score)}
          </div>
        </div>
        <div class="client-details">
          <div class="row"><span>Fase</span><span class="value" style="color:${stage.color}">${stage.label}</span></div>
          <div class="row"><span>Tipologia</span><span class="value">${esc(client.search_typology) || '—'}</span></div>
          <div class="row"><span>Orçamento</span><span class="value">${fmtMoney(client.budget_min)} — ${fmtMoney(client.budget_max)}</span></div>
          <div class="row"><span>Zonas</span><span class="value">${client.search_zones ? client.search_zones.join(', ') : '—'}</span></div>
          ${cQual ? `<div class="row"><span>Urgência</span><span class="value">${esc(cQual.urgency)}</span></div>` : ''}
          ${cQual && cQual.has_pre_approval ? `<div class="row"><span>Pré-aprovação</span><span class="value" style="color:var(--success)">${fmtMoney(cQual.pre_approval_amount)} (${esc(cQual.pre_approval_bank)})</span></div>` : ''}
        </div>
        <div class="pipeline-bar-container">
          <div class="pipeline-label">
            <span>Progresso</span>
            <span>${done}/${total} tarefas · ${pct}%</span>
          </div>
          <div class="pipeline-bar">
            <div class="pipeline-fill" style="width:${pct}%;background:${stage.color}"></div>
          </div>
        </div>
        ${pendingTasks.length > 0 ? `
        <div class="tasks-section">
          <div class="tasks-title">Próximas tarefas</div>
          ${pendingTasks.map(t => {
            const stg = stageTaskMap[t.stage_key];
            const taskDef = stg ? (stg.sub_tasks || []).find(st => st.key === t.sub_task_key) : null;
            const label = taskDef ? taskDef.label : t.sub_task_key;
            return `<div class="task-item">
              <div class="task-check"></div>
              <span class="task-text">${esc(label)}</span>
            </div>`;
          }).join('')}
        </div>` : ''}
      `;
      grid.appendChild(card);
    });

    // ── Visits ──
    const clientVisits = visits.filter(v =>
      clients.some(c => c.id === v.client_id)
    );
    document.getElementById('visitCount').textContent = clientVisits.length;
    const visitsList = document.getElementById('visitsList');
    visitsList.innerHTML = '';

    if (clientVisits.length === 0) {
      visitsList.innerHTML = '<div style="color:var(--dim);padding:20px;">Sem visitas agendadas</div>';
    } else {
      clientVisits.forEach(v => {
        const client = clients.find(c => c.id === v.client_id);
        const vs = STATUS_VISIT[v.visit_status] || { label: v.visit_status, class: '' };
        const stars = v.client_rating ? '★'.repeat(v.client_rating) + '☆'.repeat(5-v.client_rating) : '';

        visitsList.innerHTML += `
          <div class="visit-card">
            <div class="visit-header">
              <div>
                <strong>${esc(v.property_address)}</strong>
                <div style="font-size:12px;color:var(--dim)">${esc(v.property_typology)} · ${fmtMoney(v.property_price)} · Ref: ${esc(v.property_ref)}</div>
              </div>
              <span class="visit-status ${vs.class}">${vs.label}</span>
            </div>
            <div class="visit-details">
              <strong>${client ? esc(client.name) : '—'}</strong> · ${fmtDateTime(v.proposed_datetime)}
              ${v.consultant_notes ? `<div style="margin-top:6px;font-style:italic;">"${esc(v.consultant_notes)}"</div>` : ''}
            </div>
            ${stars ? `<div class="visit-rating" style="color:var(--gold)">${stars} <span style="color:var(--dim)">${esc(v.client_feedback)}</span></div>` : ''}
          </div>
        `;
      });
    }

    // Show content
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';

  } catch(e) {
    document.getElementById('loading').innerHTML = '<span style="color:var(--error)">Erro: ' + esc(e.message) + '</span>';
    console.error(e);
  }
}

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
loadConsultants();
setInterval(() => { if(currentConsultant) loadDashboard(); }, 300000);
</script>
